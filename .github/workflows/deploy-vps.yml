name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      LIBRE_TRANSLATE_KEY: ${{ secrets.LIBRE_TRANSLATE_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      NEXT_PUBLIC_MESSENGER_URL: ${{ vars.NEXT_PUBLIC_MESSENGER_URL }}
      NEXT_PUBLIC_ZALO_URL: ${{ vars.NEXT_PUBLIC_ZALO_URL }}
      NEXT_PUBLIC_HOTLINE_TEL: ${{ vars.NEXT_PUBLIC_HOTLINE_TEL }}
      NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
      NEXT_PUBLIC_FB_PIXEL_ID: ${{ vars.NEXT_PUBLIC_FB_PIXEL_ID }}
      NEXT_PUBLIC_CONTACT_EMAIL: ${{ vars.NEXT_PUBLIC_CONTACT_EMAIL }}
      NEXT_PUBLIC_APP_MESSAGE: ${{ vars.NEXT_PUBLIC_APP_MESSAGE }}
      NEXT_PUBLIC_ADMIN_APP_MESSAGE: ${{ vars.NEXT_PUBLIC_ADMIN_APP_MESSAGE }}
      NEXT_PUBLIC_APP_MESSAGE_KIND: ${{ vars.NEXT_PUBLIC_APP_MESSAGE_KIND }}
      REDIS_URL: ${{ vars.REDIS_URL }}
      REDIS_CACHE_PREFIX: ${{ vars.REDIS_CACHE_PREFIX }}
      OTP_DEBUG: ${{ vars.OTP_DEBUG }}
      SESSION_COOKIE_SECURE: ${{ vars.SESSION_COOKIE_SECURE }}
      LIBRE_TRANSLATE_URL: ${{ vars.LIBRE_TRANSLATE_URL }}
      CHAT_UPLOAD_RETENTION_MS: ${{ vars.CHAT_UPLOAD_RETENTION_MS }}
      CHAT_UPLOAD_RETENTION_HOURS: ${{ vars.CHAT_UPLOAD_RETENTION_HOURS }}
      CLOUDINARY_CLOUD_NAME: ${{ vars.CLOUDINARY_CLOUD_NAME }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          CLOUDINARY_URL: ${{ secrets.CLOUDINARY_URL }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          LIBRE_TRANSLATE_KEY: ${{ secrets.LIBRE_TRANSLATE_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_MESSENGER_URL: ${{ vars.NEXT_PUBLIC_MESSENGER_URL }}
          NEXT_PUBLIC_ZALO_URL: ${{ vars.NEXT_PUBLIC_ZALO_URL }}
          NEXT_PUBLIC_HOTLINE_TEL: ${{ vars.NEXT_PUBLIC_HOTLINE_TEL }}
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_FB_PIXEL_ID: ${{ vars.NEXT_PUBLIC_FB_PIXEL_ID }}
          NEXT_PUBLIC_CONTACT_EMAIL: ${{ vars.NEXT_PUBLIC_CONTACT_EMAIL }}
          NEXT_PUBLIC_APP_MESSAGE: ${{ vars.NEXT_PUBLIC_APP_MESSAGE }}
          NEXT_PUBLIC_ADMIN_APP_MESSAGE: ${{ vars.NEXT_PUBLIC_ADMIN_APP_MESSAGE }}
          NEXT_PUBLIC_APP_MESSAGE_KIND: ${{ vars.NEXT_PUBLIC_APP_MESSAGE_KIND }}
          REDIS_URL: ${{ vars.REDIS_URL }}
          REDIS_CACHE_PREFIX: ${{ vars.REDIS_CACHE_PREFIX }}
          OTP_DEBUG: ${{ vars.OTP_DEBUG }}
          SESSION_COOKIE_SECURE: ${{ vars.SESSION_COOKIE_SECURE }}
          LIBRE_TRANSLATE_URL: ${{ vars.LIBRE_TRANSLATE_URL }}
          CHAT_UPLOAD_RETENTION_MS: ${{ vars.CHAT_UPLOAD_RETENTION_MS }}
          CHAT_UPLOAD_RETENTION_HOURS: ${{ vars.CHAT_UPLOAD_RETENTION_HOURS }}
          CLOUDINARY_CLOUD_NAME: ${{ vars.CLOUDINARY_CLOUD_NAME }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          script_stop: true
          envs: >-
            DATABASE_URL,AUTH_SECRET,CLOUDINARY_URL,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET,LIBRE_TRANSLATE_KEY,
            NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_GOOGLE_CLIENT_ID,NEXT_PUBLIC_MESSENGER_URL,NEXT_PUBLIC_ZALO_URL,
            NEXT_PUBLIC_HOTLINE_TEL,NEXT_PUBLIC_GA_ID,NEXT_PUBLIC_FB_PIXEL_ID,NEXT_PUBLIC_CONTACT_EMAIL,
            NEXT_PUBLIC_APP_MESSAGE,NEXT_PUBLIC_ADMIN_APP_MESSAGE,NEXT_PUBLIC_APP_MESSAGE_KIND,
            REDIS_URL,REDIS_CACHE_PREFIX,OTP_DEBUG,SESSION_COOKIE_SECURE,LIBRE_TRANSLATE_URL,
            CHAT_UPLOAD_RETENTION_MS,CHAT_UPLOAD_RETENTION_HOURS,CLOUDINARY_CLOUD_NAME
          script: |
            set -euo pipefail
            APP_DIR="${{ vars.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="/root/furniture-ecm/current"; fi
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            bash scripts/render-deploy-env.sh .env
            docker compose up -d --build
            docker image prune -f
